<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AEC Attendance Display</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

background:#0d6efd;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;

}

.displayCard{

width:90%;
max-width:900px;
background:white;
color:#333;
border-radius:20px;
padding:40px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.25);

}

#displaySubject{

font-size:34px;
margin-bottom:20px;
color:#0d6efd;

}

#displayCode{

font-size:120px;
font-weight:bold;
letter-spacing:12px;
color:#0d6efd;
animation:pulse 1.2s infinite;

}

#displayCountdown{

font-size:42px;
color:#dc3545;
margin-top:20px;

}

#displayStatus{

font-size:26px;
margin-top:20px;
font-weight:bold;

}

#displayPresent{

font-size:26px;
margin-top:15px;
color:#198754;

}

#footer{

margin-top:30px;
font-size:18px;
color:#777;

}

</style>

</head>

<body>

<div class="displayCard">

<h1>AEC Attendance System</h1>

<h3>A.D. Patel Institute of Technology</h3>

<hr>

<div id="displaySubject">

No Active Session

</div>

<div id="displayCode">

------

</div>

<div id="displayCountdown">

⏳ Waiting...

</div>

<div id="displayStatus">

No Active Session

</div>

<div id="displayPresent">

Present : 0

</div>

<div id="footer">

Attendance code changes automatically every 20 seconds

</div>

</div>

<script src="js/config.js"></script>
<script src="js/display.js"></script>

</body>

</html>
<footer class="footer">
    AEC Attendance System V2.2 Stable
    <br>
    © 2026 A.D. Patel Institute of Technology
</footer>
