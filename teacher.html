<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AEC Attendance System</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <!-- LOGIN -->

    <div class="card" id="loginBox">

        <h1>AEC Attendance System</h1>

        <h3>Teacher Login</h3>

        <input
            type="password"
            id="pin"
            placeholder="Teacher PIN">

        <input
            type="password"
            id="secret"
            placeholder="Secret Key">

        <button onclick="login()">

            Login

        </button>

    </div>

    <!-- DASHBOARD -->

    <div
        class="card"
        id="dashboard"
        style="display:none;">

        <h2>Teacher Dashboard</h2>

        <hr>

        <h3>Add Class</h3>

        <input
            id="className"
            placeholder="Class Name">

        <input
            id="branch"
            placeholder="Branch">

        <input
            id="semester"
            placeholder="Semester">

        <button onclick="addClass()">

            Add Class

        </button>

        <hr>

        <h3>Attendance Session</h3>

        <label>Select Class</label>

        <select id="sessionClass">

        </select>

        <br><br>

        <label>Subject</label>

        <input
            id="subject"
            placeholder="Enter Subject">

        <button onclick="startAttendance()">

            Start Attendance

        </button>

        <button onclick="stopAttendance()">

            Stop Attendance

        </button>

        <br><br>

        <div id="attendancePanel">

            <h2>Attendance Code</h2>

            <h1 id="attendanceCode">

                -----

            </h1>

            <h3 id="attendanceStatus">

                No Active Session

            </h3>

        </div>

        <hr>

        <h3>Available Classes</h3>

        <table>

            <thead>

                <tr>

                    <th>Class</th>
                    <th>Branch</th>
                    <th>Semester</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="classTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/teacher.js"></script>

</body>

</html>
