<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AEC Attendance System - Teacher</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card" id="loginBox">

        <h1>AEC Attendance System</h1>

        <h3>Teacher Login</h3>

        <input
            id="pin"
            type="password"
            placeholder="Teacher PIN">

        <input
            id="secret"
            type="password"
            placeholder="Secret Key">

        <button onclick="login()">
            Login
        </button>

    </div>

    <div
        class="card"
        id="dashboard"
        style="display:none;">

        <h2>Teacher Dashboard</h2>

        <h3>Add Class</h3>

        <input
            id="className"
            placeholder="Class Name">

        <input
            id="branch"
            placeholder="Branch">

        <input
            id="semester"
            placeholder="Semester">

        <button onclick="addClass()">
            Add Class
        </button>

        <br><br>

        <table border="1" width="100%">

            <thead>

                <tr>

                    <th>Class</th>
                    <th>Branch</th>
                    <th>Semester</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="classTable"></tbody>

        </table>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/teacher.js"></script>

</body>

</html>
